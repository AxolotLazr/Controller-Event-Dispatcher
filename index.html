<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <script type="module" src="Modules/gamepadDispatcher.js"></script>
    </head>
    <body>
        <div>
            <h1>General Controller</h1>
            <div>
                <h2>Inputs</h2>
                <div>
                    <div class="flex h">
                        <div>
                            <h3>Buttons</h3>
                            <div class="flex v gap">
                                <div class="flex h gap">
                                    <div class="flex v">
                                        <div>Bumpers</div>
                                        <div class="rawButtonHolder bumpers flex h gap pad outline">
                                            <div class="rawButton bumper left outline"></div>
                                            <div class="grow"></div>
                                            <div class="rawButton bumper right outline"></div>
                                        </div>
                                    </div>
                                    <div class="flex v" style="align-items: center;">
                                        <div>Guide Button</div>
                                        <div class="rawButtonHolder guideButton pad outline">
                                            <div class="rawButton guideButton outline"></div>
                                        </div>
                                    </div>
                                    <div class="flex v">
                                        <div>Menu Buttons</div>
                                        <div class="rawButtonHolder menuButtons flex h gap pad outline">
                                            <div class="rawButton menuButton left outline"></div>
                                            <div class="grow"></div>
                                            <div class="rawButton menuButton right outline"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex h gap">
                                    <div>
                                        <div>Directional Pad</div>
                                        <div class="rawButtonHolder directionalPad pad outline">
                                            <div class="rawButton outline"></div>
                                            <div class="rawButton outline"></div>
                                            <div class="rawButton outline"></div>
                                            <div class="rawButton outline"></div>
                                            <div class="rawButton outline"></div>
                                        </div>
                                    </div>
                                    <div class="flex v gap">
                                        <div>Stick Buttons</div>
                                        <div class="rawButtonHolder stickButtons flex h gap pad outline">
                                            <div class="rawButton stickButton left outline"></div>
                                            <div class="grow"></div>
                                            <div class="rawButton stickButton right outline"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div>Face Buttons</div>
                                        <div class="rawButtonHolder faceButtons pad outline">
                                            <div class="rawButton outline"></div>
                                            <div class="rawButton outline"></div>
                                            <div class="rawButton outline"></div>
                                            <div class="rawButton outline"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex h gap">
                        <div>
                            <h3>Joysticks</h3>
                            <div class="flex h gap outline pad">
                                <div>
                                    <div>Left Stick</div>
                                    <div class="rawJoystickHolder left outline">
                                        <div class="rawJoystick"></div>
                                    </div>
                                </div>
                                <div>
                                    <div>Right Stick</div>
                                    <div class="rawJoystickHolder right outline">
                                        <div class="rawJoystick"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <h3>Triggers</h3>
                            <div class="flex h gap outline pad">
                                <div>
                                    <div>Left Trigger</div>
                                    <div class="rawTrigger left outline"></div>
                                </div>
                                <div>
                                    <div>Right Trigger</div>
                                    <div class="rawTrigger right outline"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <style>
            :root {
                --leftStick-x: 0;
                --leftStick-y: 0;
                --leftStickButton: 0;

                --rightStick-x: 0;
                --rightStick-y: 0;
                --rightStickButton: 0;

                --leftTrigger: 0;
                --rightTrigger: 0;
                
                --leftBumper: 0;
                --rightBumper: 0;

                --faceButtonBottom: 0;
                --faceButtonTop: 0;
                --faceButtonLeft: 0;
                --faceButtonRight: 0;

                --directionalPadUp: 0;
                --directionalPadDown: 0;
                --directionalPadLeft: 0;
                --directionalPadRight: 0;

                --leftMenuButton: 0;
                --rightMenuButton: 0;
                --guideButton: 0;
                --touchpadButton: 0;

                color: #fff;
                font-family: monospace, 'Courier New', Courier;

                background-color: #000;
            }

            .flex {
                display: flex;

                &.h {
                    flex-direction: row;
                }
                &.v {
                    flex-direction: column;
                }
                &.gap {
                    gap: 8px;
                }
            }
            .pad {
                padding: 4px;
            }
            .outline {
                outline: solid 1px #fff8;
            }
            .grow {
                flex-grow: 1;
            }

            .rawJoystickHolder {
                --value-x: 0;
                --value-y: 0;

                display: flex;
                align-items: center;
                justify-content: center;

                aspect-ratio: 1;

                position: relative;
                width: 128px;
                background-color: #fff1;
                background-image:
                    linear-gradient( 90deg,
                        #0000 calc(50% - 0.5px), 
                        #fff2 calc(50% - 0.5px) calc(50% + 0.5px), 
                        #0000 calc(50% + 0.5px) 100% 
                    ),
                    linear-gradient(
                        #0000 calc(50% - 0.5px), 
                        #fff2 calc(50% - 0.5px) calc(50% + 0.5px), 
                        #0000 calc(50% + 0.5px) 100% 
                    ),
                    linear-gradient( 90deg,
                        #0000 calc(50% - 0.5px + (50% * var(--value-x))), 
                        #fff6 calc(50% - 0.5px + (50% * var(--value-x))) calc(50% + 0.5px + (50% * var(--value-x))), 
                        #0000 calc(50% + 0.5px + (50% * var(--value-x))) 100% 
                    ),
                    linear-gradient(
                        #0000 calc(50% - 0.5px + (50% * var(--value-y))), 
                        #fff6 calc(50% - 0.5px + (50% * var(--value-y))) calc(50% + 0.5px + (50% * var(--value-y))), 
                        #0000 calc(50% + 0.5px + (50% * var(--value-y))) 100% 
                    )
                ;

                &.left {
                    --value-x: var(--leftStick-x);
                    --value-y: var(--leftStick-y);
                }
                &.right {
                    --value-x: var(--rightStick-x);
                    --value-y: var(--rightStick-y);
                }
            }
                .rawJoystick {
                    aspect-ratio: 1;

                    position: relative;
                    left: calc(50% * var(--value-x));
                    top: calc(50% * var(--value-y));
                    width: 4px;
                    background-color: #fff;

                    border-radius: 100%;

                    outline: solid 1px #000;
                }
            .rawTrigger {
                --value: 0;

                display: flex;
                align-items: center;
                justify-content: center;

                aspect-ratio: 1/3;

                position: relative;
                height: 128px;
                background-color: #fff1;
                background-image:
                    linear-gradient(0deg,
                        color-mix(in oklab, #0000, #fff8 calc(100% * var(--value))) 0% calc(100% * var(--value)), 
                        #fff4 calc(100% * var(--value)) calc((100% * var(--value)) + 1px), 
                        #0000 calc((100% * var(--value)) + 1px) 100%
                    )
                ;

                &.left {
                    --value: var(--leftTrigger);
                }
                &.right {
                    --value: var(--rightTrigger);
                }
            }
            .rawButtonHolder {
                position: relative;

                &.directionalPad, &.faceButtons {
                    display: flex;
                    align-items: center;
                    justify-content: center;

                    aspect-ratio: 1;
                    
                    height: 96px;

                    >* {
                        position: absolute;
                    }
                }
                &.directionalPad {
                    border-radius: 50%;

                    >* {
                        border-radius: 10%;
                    }
                    >:last-child {
                        background-color: #000;

                        border-radius: 0%;
                    }
                    >:nth-child(1) {
                        --value: var(--directionalPadUp);

                        transform: translateY(-90%);
                    }
                    >:nth-child(2) {
                        --value: var(--directionalPadDown);

                        transform: translateY(90%);
                    }
                    >:nth-child(3) {
                        --value: var(--directionalPadLeft);

                        transform: translateX(-90%);
                    }
                    >:nth-child(4) {
                        --value: var(--directionalPadRight);

                        transform: translateX(90%);
                    }
                }
                &.faceButtons {
                    border-radius: 4px;

                    >* {
                        border-radius: 50%;
                    }
                    >:nth-child(1) {
                        --value: var(--faceButtonBottom);

                        transform: translateY(90%);
                    }
                    >:nth-child(2) {
                        --value: var(--faceButtonRight);

                        transform: translateX(90%);
                    }
                    >:nth-child(3) {
                        --value: var(--faceButtonLeft);

                        transform: translateX(-90%);
                    }
                    >:nth-child(4) {
                        --value: var(--faceButtonTop);

                        transform: translateY(-90%);
                    }

                }
                &.stickButtons {
                    border-radius: 8px;
                }
                &.bumpers {
                    border-radius: 4px;
                }
                &.guideButton {
                    border-radius: 50%;
                }
                &.menuButtons {
                    border-radius: 100px;
                }
            }
                .rawButton {
                    --value: 0;

                    display: flex;
                    align-items: center;
                    justify-content: center;

                    aspect-ratio: 1;

                    position: relative;
                    height: 32px;
                    background-color: #fff1;
                    background-image:
                        linear-gradient(0deg,
                            color-mix(in oklab, #0000, #fff8 calc(100% * var(--value))) 0% 100%
                        )
                    ;

                    &.stickButton {
                        border-radius: 50%;

                        &.left {
                            --value: var(--leftStickButton);
                        }
                        &.right {
                            --value: var(--rightStickButton);
                        }
                    }
                    &.menuButton {
                        height: 24px;

                        border-radius: 50%;

                        &.left {
                            --value: var(--leftMenuButton);
                        }
                        &.right {
                            --value: var(--rightMenuButton);
                        }
                    }
                    &.bumper {
                        aspect-ratio: 2;

                        border-radius: 4px;

                        &.left {
                            --value: var(--leftBumper);
                        }
                        &.right {
                            --value: var(--rightBumper);
                        }
                    }
                    &.guideButton {
                        --value: var(--guideButton);

                        border-radius: 50%;

                        height: 40px;
                    }
                }
        </style>

        <script>
            let root = document.querySelector(':root');

            document.addEventListener('gamepadConnection', function (e) {
                console.log(e)
            });
            document.addEventListener('gamepadButtonInput', function (e) {
                console.log(e);

                root.style.setProperty('--' + e.name, (e.value ? 1 : 0))
            });
            document.addEventListener('gamepadTriggerInput', function (e) {
                if (e.name.includes('left')) {
                    root.style.setProperty('--leftTrigger', e.value)
                };
                if (e.name.includes('right')) {
                    root.style.setProperty('--rightTrigger', e.value)
                };
            });
            document.addEventListener('gamepadStickInput', function (e) {
                if (e.name.includes('left')) {
                    root.style.setProperty('--leftStick-x', e.value[0])
                    root.style.setProperty('--leftStick-y', e.value[1])
                };
                if (e.name.includes('right')) {
                    root.style.setProperty('--rightStick-x', e.value[0])
                    root.style.setProperty('--rightStick-y', e.value[1])
                };
            });
        </script>
    </body>
</html>
